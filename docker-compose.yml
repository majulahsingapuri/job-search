services:
  job-agent:
    build: .
    container_name: job-agent
    env_file: .env.prod
    volumes:
      - ./db:/app/db          # SQLite persistence
      - ./logs:/app/logs      # Log persistence
      - ./config:/app/config  # Resume variants + search config
    restart: unless-stopped
    # Keeps container alive; CRON runs inside via schedule library
    command: python main.py

  job-ui:
    build: ./ui
    container_name: job-ui
    environment:
      - DB_PATH=/app/db/jobs.sqlite
    volumes:
      - ./db:/app/db
    ports:
      - "8080:8080"
    restart: unless-stopped
